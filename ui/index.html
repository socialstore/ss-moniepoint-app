<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>Moniepoint · Sentralbee</title>
    <!-- Theme the DOCUMENT background before the app CSS loads, so the WebView/iframe's first painted
         frame is the right colour — otherwise the browser paints its default white canvas until index.css
         applies bg-background (the white flash). Values match the app --background. -->
    <style>
      :root { background-color: #f6f7fa; }
      :root.dark { background-color: #0f1420; }
    </style>
    <!-- Set the theme class BEFORE CSS/React paints. The host bakes the initial theme into ?theme=;
         live flips still arrive via postMessage. -->
    <script>
      (function () {
        try {
          var t = new URLSearchParams(location.search).get("theme");
          if (t === "dark" || (!t && matchMedia("(prefers-color-scheme: dark)").matches)) {
            document.documentElement.classList.add("dark");
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
